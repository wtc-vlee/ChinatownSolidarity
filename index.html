<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinatown Passport | Chinatown Solidarity Summit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;700&display=swap');

        :root {
            --cream: #E8DDD3;
            --warm-beige: #D9CBBE;
            --deep-red: #B22234;
            --accent-red: #C4392D;
            --dark-brown: #3D2B1F;
            --gold: #C49A3C;
            --soft-gold: #D4AF61;
            --charcoal: #2C2C2C;
            --off-white: #F5F0EB;
            --sage: #7A8B6F;
            --muted-teal: #5A7D7C;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--cream);
            color: var(--charcoal);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ===== PAGE SYSTEM ===== */
        .page {
            display: none;
            min-height: 100vh;
            animation: fadeIn 0.35s ease;
        }
        .page.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== COVER PAGE ===== */
        .cover {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--cream);
            text-align: center;
            padding: 40px 20px;
        }

        .passport-book {
            width: clamp(280px, 50vw, 420px);
            background: var(--deep-red);
            border-radius: 8px;
            padding: 40px 32px 36px;
            margin-bottom: 32px;
            box-shadow:
                inset 0 0 0 3px rgba(196,159,60,0.35),
                inset 0 0 0 6px var(--deep-red),
                inset 0 0 0 8px rgba(196,159,60,0.2),
                0 12px 40px rgba(61,43,31,0.25),
                4px 0 0 0 #8B1A28,
                6px 0 0 0 #6E1520;
            position: relative;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .passport-book:hover {
            transform: translateY(-4px);
            box-shadow:
                inset 0 0 0 3px rgba(196,159,60,0.35),
                inset 0 0 0 6px var(--deep-red),
                inset 0 0 0 8px rgba(196,159,60,0.2),
                0 20px 50px rgba(61,43,31,0.3),
                4px 0 0 0 #8B1A28,
                6px 0 0 0 #6E1520;
        }

        .passport-book::before {
            content: '';
            position: absolute;
            top: 12px; left: 12px; right: 12px; bottom: 12px;
            border: 1px solid rgba(196,159,60,0.25);
            border-radius: 4px;
            pointer-events: none;
        }

        .passport-crest {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            border: 2px solid var(--soft-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .passport-crest svg {
            width: 40px;
            height: 40px;
        }

        .passport-book h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 900;
            color: var(--soft-gold);
            letter-spacing: 4px;
            text-transform: uppercase;
            line-height: 1.15;
            margin-bottom: 4px;
        }

        .passport-book h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(16px, 2.5vw, 24px);
            font-weight: 400;
            color: rgba(212,175,97,0.7);
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .passport-chinese {
            font-family: 'Noto Serif SC', serif;
            font-size: clamp(14px, 2vw, 20px);
            color: rgba(212,175,97,0.6);
            letter-spacing: 6px;
            margin-bottom: 24px;
        }

        .passport-divider {
            width: 60px;
            height: 1px;
            background: rgba(212,175,97,0.3);
            margin: 0 auto 16px;
        }

        .passport-label {
            font-family: 'Playfair Display', serif;
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(212,175,97,0.5);
        }

        .cover-subtitle {
            font-family: 'Playfair Display', serif;
            font-size: clamp(13px, 1.8vw, 17px);
            color: var(--dark-brown);
            font-style: italic;
            max-width: 560px;
            margin-bottom: 32px;
            opacity: 0.7;
        }

        .cover-enter {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--deep-red);
            color: white;
            border: none;
            padding: 14px 36px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cover-enter:hover { background: #9A1D2E; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(178,34,52,0.25); }

        /* ===== DIRECTORY PAGE ===== */
        .directory {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .dir-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .dir-header-crest {
            margin-bottom: 12px;
        }

        .dir-logo {
            width: 120px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .dir-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--deep-red);
            margin-bottom: 6px;
        }

        .dir-header p {
            font-size: 13px;
            color: var(--dark-brown);
            opacity: 0.5;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .dir-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .dir-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 18px 20px;
            background: var(--off-white);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .dir-card:hover {
            border-color: var(--deep-red);
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.07);
        }

        .dir-card-num {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--deep-red);
            min-width: 36px;
        }

        .dir-card-thumb {
            width: 56px;
            height: 56px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .dir-card-icon {
            width: 56px;
            height: 56px;
            border-radius: 10px;
            background: rgba(178,34,52,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .dir-card-icon svg {
            width: 38px;
            height: 38px;
        }
        .dir-card:hover .dir-card-icon {
            background: rgba(178,34,52,0.1);
        }

        .dir-card-info { flex: 1; }

        .dir-card-city {
            font-weight: 600;
            font-size: 16px;
            color: var(--charcoal);
        }

        .dir-card-region {
            font-size: 12px;
            color: var(--dark-brown);
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dir-card-arrow {
            color: var(--deep-red);
            opacity: 0.3;
            font-size: 18px;
            transition: opacity 0.2s;
        }
        .dir-card:hover .dir-card-arrow { opacity: 0.8; }

        /* ===== CITY DETAIL PAGE ===== */
        .city-page-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(232, 221, 211, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(61,43,31,0.08);
            padding: 10px 20px;
        }

        .city-page-nav-inner {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: 1px solid rgba(61,43,31,0.15);
            padding: 7px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark-brown);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: white; border-color: var(--deep-red); color: var(--deep-red); }

        .nav-title {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--deep-red);
        }

        .nav-arrows {
            display: flex;
            gap: 8px;
        }

        .nav-arrow-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid rgba(61,43,31,0.15);
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            color: var(--dark-brown);
            transition: all 0.2s;
        }
        .nav-arrow-btn:hover { background: var(--deep-red); color: white; border-color: var(--deep-red); }
        .nav-arrow-btn:disabled { opacity: 0.25; cursor: default; background: none; color: var(--dark-brown); border-color: rgba(61,43,31,0.1); }

        .city-detail {
            max-width: 960px;
            margin: 0 auto;
            padding: 30px 20px 80px;
        }

        /* City Header */
        .city-hero {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 32px;
            background: var(--dark-brown);
        }

        .city-hero-img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            opacity: 0.7;
        }

        .city-hero-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 40px 32px 28px;
            background: linear-gradient(transparent, rgba(30,20,15,0.85));
        }

        .city-hero-number {
            font-size: 12px;
            letter-spacing: 4px;
            color: var(--soft-gold);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .city-hero-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(32px, 5vw, 50px);
            font-weight: 900;
            color: white;
            line-height: 1.1;
            margin-bottom: 4px;
        }

        .city-hero-chinese {
            font-family: 'Noto Serif SC', serif;
            font-size: 18px;
            color: var(--soft-gold);
            margin-bottom: 6px;
        }

        .city-hero-location {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Image Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 32px;
        }

        .gallery img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .gallery img:hover { transform: scale(1.02); }

        /* Cards */
        .card {
            background: var(--off-white);
            border-radius: 12px;
            padding: 28px 28px;
            margin-bottom: 20px;
            border: 1px solid rgba(61,43,31,0.05);
        }

        .card-label {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 14px;
            padding: 4px 12px;
            border-radius: 4px;
        }
        .card-label.about { background: rgba(178,34,52,0.08); color: var(--deep-red); }
        .card-label.strengths { background: rgba(122,139,111,0.15); color: var(--sage); }
        .card-label.challenges { background: rgba(196,159,60,0.15); color: #8B7024; }
        .card-label.orgs { background: rgba(90,125,124,0.12); color: var(--muted-teal); }

        .card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 21px;
            color: var(--dark-brown);
            margin-bottom: 14px;
        }

        .card p, .card li {
            font-size: 15px;
            line-height: 1.75;
            color: var(--charcoal);
            opacity: 0.85;
        }

        .card ul { padding-left: 20px; }
        .card li { margin-bottom: 8px; }
        .card li::marker { color: var(--deep-red); }

        .quick-facts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
            margin-top: 18px;
        }

        .fact-item {
            text-align: center;
            padding: 14px 8px;
            background: white;
            border-radius: 8px;
        }

        .fact-value {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--deep-red);
            margin-bottom: 2px;
        }

        .fact-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--dark-brown);
            opacity: 0.5;
        }

        .org-list { list-style: none; padding: 0; }
        .org-list li {
            padding: 12px 16px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid var(--muted-teal);
        }
        .org-list li strong { display: block; font-size: 15px; color: var(--dark-brown); margin-bottom: 2px; }
        .org-list li span { font-size: 13px; color: var(--charcoal); opacity: 0.6; }

        /* Bottom nav */
        .city-bottom-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid rgba(61,43,31,0.1);
        }

        .bottom-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: 1px solid rgba(61,43,31,0.15);
            padding: 12px 24px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--dark-brown);
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .bottom-nav-btn:hover { background: var(--deep-red); color: white; border-color: var(--deep-red); }
        .bottom-nav-btn.primary { background: var(--deep-red); color: white; border-color: var(--deep-red); }
        .bottom-nav-btn.primary:hover { background: #9A1D2E; }

        /* City quick-nav dropdown */
        .city-quick-nav {
            position: relative;
            display: inline-block;
        }

        .city-quick-nav-dropdown {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 8px;
            margin-bottom: 8px;
            width: 220px;
            max-height: 320px;
            overflow-y: auto;
            z-index: 200;
        }
        .city-quick-nav-dropdown.show { display: block; }

        .city-quick-nav-dropdown button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 8px 12px;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: var(--charcoal);
            border-radius: 6px;
            cursor: pointer;
        }
        .city-quick-nav-dropdown button:hover { background: var(--off-white); color: var(--deep-red); }
        .city-quick-nav-dropdown button.active-city { font-weight: 700; color: var(--deep-red); }

        /* ===== CITY HERO ILLUSTRATION ===== */
        .city-hero-illustration {
            width: 100%;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .city-hero-illustration svg {
            width: 100%;
            height: 100%;
        }

        /* ===== EXPLORATION BADGES ===== */
        .badges-section {
            margin-bottom: 32px;
            background: var(--off-white);
            border-radius: 16px;
            padding: 28px 20px;
            border: 1px solid rgba(61,43,31,0.05);
        }
        .badges-section-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--dark-brown);
            margin-bottom: 6px;
            text-align: center;
        }
        .badges-section-subtitle {
            font-size: 12px;
            color: var(--dark-brown);
            opacity: 0.45;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .badges-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
        }
        .badge {
            width: 105px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.25s ease, filter 0.25s ease;
        }
        .badge:hover { transform: translateY(-4px) scale(1.05); }
        .badge:active { transform: scale(0.95); }
        .badge-icon {
            width: 84px;
            height: 84px;
            margin: 0 auto 10px;
            border-radius: 50%;
            border: 3px dashed rgba(61,43,31,0.15);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: visible;
        }
        .badge-icon svg {
            width: 38px;
            height: 38px;
            opacity: 0.25;
            transition: all 0.4s;
            filter: grayscale(1);
        }

        /* Each badge gets its own color */
        .badge[data-color="red"] .badge-icon { --badge-bg: linear-gradient(135deg, #FFE8EA, #FFD0D4); --badge-border: #E8485C; --badge-glow: rgba(232,72,92,0.35); }
        .badge[data-color="orange"] .badge-icon { --badge-bg: linear-gradient(135deg, #FFF0E0, #FFE0C0); --badge-border: #E8842A; --badge-glow: rgba(232,132,42,0.35); }
        .badge[data-color="blue"] .badge-icon { --badge-bg: linear-gradient(135deg, #E4F0FF, #CCE0FF); --badge-border: #4A90D9; --badge-glow: rgba(74,144,217,0.35); }
        .badge[data-color="purple"] .badge-icon { --badge-bg: linear-gradient(135deg, #F2E8FF, #E4D0FF); --badge-border: #9B59B6; --badge-glow: rgba(155,89,182,0.35); }
        .badge[data-color="green"] .badge-icon { --badge-bg: linear-gradient(135deg, #E4F8E8, #C8F0D0); --badge-border: #4CAF50; --badge-glow: rgba(76,175,80,0.35); }
        .badge[data-color="teal"] .badge-icon { --badge-bg: linear-gradient(135deg, #E0F5F4, #C0EBE8); --badge-border: #26A69A; --badge-glow: rgba(38,166,154,0.35); }

        .badge.claimed .badge-icon {
            border-style: solid;
            border-color: var(--badge-border);
            background: var(--badge-bg);
            box-shadow: 0 4px 20px var(--badge-glow), 0 0 0 4px rgba(255,255,255,0.8);
            animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .badge.claimed .badge-icon svg {
            opacity: 1;
            filter: none;
            transform: scale(1.1);
        }
        .badge.claimed .badge-icon::after {
            content: '\2713';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 22px;
            height: 22px;
            background: var(--badge-border);
            color: white;
            font-size: 12px;
            font-weight: 800;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        /* Sparkle effect on claim */
        .badge.claimed .badge-icon::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent,
                var(--badge-glow),
                transparent,
                var(--badge-glow),
                transparent
            );
            animation: badgeSpin 3s linear infinite;
            opacity: 0.5;
            z-index: -1;
        }

        @keyframes badgePop {
            0% { transform: scale(0.8); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes badgeSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .badge-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--dark-brown);
            opacity: 0.45;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.3;
            transition: all 0.3s;
        }
        .badge.claimed .badge-label {
            opacity: 1;
            color: var(--charcoal);
            font-weight: 800;
        }
        .badge[data-color="red"].claimed .badge-label { color: #E8485C; }
        .badge[data-color="orange"].claimed .badge-label { color: #CF7525; }
        .badge[data-color="blue"].claimed .badge-label { color: #4A90D9; }
        .badge[data-color="purple"].claimed .badge-label { color: #9B59B6; }
        .badge[data-color="green"].claimed .badge-label { color: #4CAF50; }
        .badge[data-color="teal"].claimed .badge-label { color: #26A69A; }
        .badge-tap {
            font-size: 9px;
            color: var(--dark-brown);
            opacity: 0.3;
            margin-top: 3px;
            transition: opacity 0.3s;
        }
        .badge.claimed .badge-tap { display: none; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            background: var(--dark-brown);
            color: var(--cream);
        }
        .footer p { font-size: 13px; opacity: 0.5; }

// ===== PAGE NAVIGATION =====
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById(pageId);
    if (page) {
        page.classList.add('active');
        window.scrollTo(0, 0);
    }
}

function getStateFromLocation(location) {
    // Extract state/province name from "State, Country" format
    return location.split(',')[0].trim();
}

function getStateSVG(location) {
    const state = getStateFromLocation(location);
    const iconPath = stateIcons[state] || `<rect x="8" y="8" width="24" height="24" rx="4" fill="#B22234" opacity="0.5"/>`;
    return `<svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">${iconPath}</svg>`;
}

// ===== BUILD DIRECTORY GRID =====
function buildDirectory() {
    const grid = document.getElementById('dir-grid');
    cities.forEach((city, i) => {
        const card = document.createElement('div');
        card.className = 'dir-card';
        card.onclick = () => showPage('page-city-' + city.id);
        card.innerHTML = `
            <span class="dir-card-num">${String(i + 1).padStart(2, '0')}</span>
            <div class="dir-card-icon">${getStateSVG(city.location)}</div>
            <div class="dir-card-info">
                <div class="dir-card-city">${city.name}</div>
                <div class="dir-card-region">${city.location}</div>
            </div>
            <span class="dir-card-arrow">\u2192</span>
        `;
        grid.appendChild(card);
    });
}

// Load claimed badges from localStorage
function getClaimedBadges(cityId) {
    try {
        const data = JSON.parse(localStorage.getItem('chinatown-passport-badges') || '{}');
        return data[cityId] || [];
    } catch { return []; }
}

function toggleBadge(cityId, badgeId) {
    try {
        const data = JSON.parse(localStorage.getItem('chinatown-passport-badges') || '{}');
        if (!data[cityId]) data[cityId] = [];
        const idx = data[cityId].indexOf(badgeId);
        if (idx >= 0) data[cityId].splice(idx, 1);
        else data[cityId].push(badgeId);
        localStorage.setItem('chinatown-passport-badges', JSON.stringify(data));
        // Toggle visual
        const el = document.querySelector(`[data-badge="${cityId}-${badgeId}"]`);
        if (el) el.classList.toggle('claimed');
    } catch {}
}

function buildCityPages() {
    const container = document.getElementById('city-pages-container');

    cities.forEach((city, idx) => {
        const prevCity = idx > 0 ? cities[idx - 1] : null;
        const nextCity = idx < cities.length - 1 ? cities[idx + 1] : null;
        const num = String(idx + 1).padStart(2, '0');

        const factsHtml = city.facts.map(f =>
            `<div class="fact-item"><div class="fact-value">${f.value}</div><div class="fact-label">${f.label}</div></div>`
        ).join('');

        const strengthsHtml = city.strengths.map(s => `<li>${s}</li>`).join('');
        const challengesHtml = city.challenges.map(c => `<li>${c}</li>`).join('');
        const orgsHtml = city.orgs.map(o =>
            `<li><strong>${o.name}</strong><span>${o.desc}</span></li>`
        ).join('');

        // Quick nav dropdown buttons
        const quickNavBtns = cities.map((c, ci) =>
            `<button onclick="showPage('page-city-${c.id}'); closeAllDropdowns();" class="${c.id === city.id ? 'active-city' : ''}">${String(ci+1).padStart(2,'0')}. ${c.name}</button>`
        ).join('');

        // City illustration
        const illustrationSvg = cityIllustrations[city.id] || cityIllustrations["boston"];

        // Badges
        const claimed = getClaimedBadges(city.id);
        const badgesHtml = badgeTemplates.map(b => {
            const isClaimed = claimed.includes(b.id);
            return `<div class="badge ${isClaimed ? 'claimed' : ''}" data-badge="${city.id}-${b.id}" data-color="${b.color}" onclick="toggleBadge('${city.id}','${b.id}')">
                <div class="badge-icon">${b.icon}</div>
                <div class="badge-label">${b.label}</div>
                <div class="badge-tap">tap to claim</div>
            </div>`;
        }).join('');

        const page = document.createElement('div');
        page.className = 'page';
        page.id = 'page-city-' + city.id;
        page.innerHTML = `
            <nav class="city-page-nav">
                <div class="city-page-nav-inner">
                    <button class="nav-btn" onclick="showPage('page-directory')">\u2190 Passport</button>
                    <span class="nav-title">${num}. ${city.name}</span>
                    <div class="nav-arrows">
                        <button class="nav-arrow-btn" ${prevCity ? `onclick="showPage('page-city-${prevCity.id}')"` : 'disabled'} title="${prevCity ? prevCity.name : ''}">\u2190</button>
                        <button class="nav-arrow-btn" ${nextCity ? `onclick="showPage('page-city-${nextCity.id}')"` : 'disabled'} title="${nextCity ? nextCity.name : ''}">\u2192</button>
                    </div>
                </div>
            </nav>

            <div class="city-detail">
                <div class="city-hero">
                    <div class="city-hero-illustration">${illustrationSvg}</div>
                    <div class="city-hero-overlay">
                        <div class="city-hero-number">No. ${num} of 18</div>
                        <h1 class="city-hero-name">${city.name}</h1>
                        <div class="city-hero-chinese">${city.chinese}</div>
                        <div class="city-hero-location">${city.location}</div>
                    </div>
                </div>

                <div class="badges-section">
                    <div class="badges-section-title">Exploration Badges</div>
                    <div class="badges-section-subtitle">Tap to collect as you explore</div>
                    <div class="badges-grid">${badgesHtml}</div>
                </div>

                <div class="card">
                    <div class="card-label about">About</div>
                    <h3>History & Notable Information</h3>
                    <p>${city.about}</p>
                    <div class="quick-facts">${factsHtml}</div>
                </div>

                <div class="card">
                    <div class="card-label strengths">Opportunities & Strengths</div>
                    <h3>Opportunities & Strengths</h3>
                    <ul>${strengthsHtml}</ul>
                </div>

                <div class="card">
                    <div class="card-label challenges">Challenges</div>
                    <h3>Challenges</h3>
                    <ul>${challengesHtml}</ul>
                </div>

                <div class="card">
                    <div class="card-label orgs">Organizations</div>
                    <h3>Key Organizations</h3>
                    <ul class="org-list">${orgsHtml}</ul>
                </div>

                <div class="city-bottom-nav">
                    ${prevCity
                        ? `<button class="bottom-nav-btn" onclick="showPage('page-city-${prevCity.id}')">\u2190 ${prevCity.name}</button>`
                        : `<button class="bottom-nav-btn" onclick="showPage('page-directory')">\u2190 Directory</button>`
                    }

                    <div class="city-quick-nav">
                        <button class="bottom-nav-btn" onclick="toggleDropdown(this)">Jump to City \u25B4</button>
                        <div class="city-quick-nav-dropdown">${quickNavBtns}</div>
                    </div>

                    ${nextCity
                        ? `<button class="bottom-nav-btn primary" onclick="showPage('page-city-${nextCity.id}')">${nextCity.name} \u2192</button>`
                        : `<button class="bottom-nav-btn primary" onclick="showPage('page-directory')">Back to Directory</button>`
                    }
                </div>
            </div>

            <footer class="footer">
                <div class="footer-logo">Chinatown Solidarity Summit 2026</div>
                <p>Connecting Chinatowns across North America</p>
            </footer>
        `;
        container.appendChild(page);
    });
}

// ===== DROPDOWN TOGGLE =====
function toggleDropdown(btn) {
    const dropdown = btn.nextElementSibling;
    const isOpen = dropdown.classList.contains('show');
    closeAllDropdowns();
    if (!isOpen) dropdown.classList.add('show');
}

function closeAllDropdowns() {
    document.querySelectorAll('.city-quick-nav-dropdown').forEach(d => d.classList.remove('show'));
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.city-quick-nav')) closeAllDropdowns();
});

// ===== KEYBOARD NAV =====
document.addEventListener('keydown', (e) => {
    const activePage = document.querySelector('.page.active');
    if (!activePage) return;
    const id = activePage.id;

    if (id.startsWith('page-city-')) {
        const cityId = id.replace('page-city-', '');
        const idx = cities.findIndex(c => c.id === cityId);
        if (e.key === 'ArrowLeft' && idx > 0) {
            showPage('page-city-' + cities[idx - 1].id);
        } else if (e.key === 'ArrowRight' && idx < cities.length - 1) {
            showPage('page-city-' + cities[idx + 1].id);
        } else if (e.key === 'Escape') {
            showPage('page-directory');
        }
    }
});

// ===== INIT =====
buildDirectory();
buildCityPages();
</script>

</body>
</html>
